deepseek:
  base_url: "https://api.deepseek.com/v1"
  api_key_env: "DEEPSEEK_API_KEY"

agents:
  # 导演-推理：仅用于叙事骨架生成（里程碑规划/故事线/弧光/伏笔网络）
  # R1 的深度思维链在全局叙事架构设计上有不可替代的优势
  director_reasoner:
    model: "deepseek-reasoner"
    max_tokens: 128000

  # 导演-执行：审查、单章规划、批次细化（骨架约束下的结构化任务）
  director:
    model: "deepseek-chat"
    temperature: 0.4
    max_tokens: 128000

  screenwriter:
    model: "deepseek-chat"
    temperature: 0.5
    max_tokens: 128000

  writer:
    model: "deepseek-chat"
    temperature: 0.85
    top_p: 0.95
    presence_penalty: 0.15
    frequency_penalty: 0.10
    max_tokens: 128000

memory:
  db_path: "./data/{project_id}/story.db"
  vector_path: "./data/{project_id}/vectors"
  embedding_model: "shibing624/text2vec-base-chinese"
  summary_max_words: 300
  recent_chapters_count: 3
  context_search_results: 5

generation:
  paragraph_target_words: 500
  chapter_target_words: 5000
  stream_to_frontend: true
